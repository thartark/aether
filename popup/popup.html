<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../css/themes.css">
  <style>
    body { width:340px; padding:20px; margin:0; }
    button, select { width:100%; padding:12px; margin:8px 0; border-radius:9999px; }
    select { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  </style>
</head>
<body>
  <h1 style="text-align:center;margin-bottom:20px;">✨ Aether</h1>

  <button id="open-side">Open Side Panel</button>
  <button id="theme-toggle">Cycle Theme</button>

  <select id="tone-select">
    <option value="professional">Professional Tone</option>
    <option value="casual">Casual Tone</option>
    <option value="creative">Creative Tone</option>
  </select>

  <button id="open-options">Settings & History</button>

  <script src="popup.js"></script>
</body>
</html>
